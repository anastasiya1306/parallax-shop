meta:
  environment: python
  toolchain:
    name: pip
    version: "3.11"

build:
  requirementsPath: requirements.txt
  useCache: true

run:
  command: >
    python manage.py migrate &&
    python manage.py createsuperuser --noinput || true &&
    python manage.py collectstatic --noinput &&
    gunicorn config.wsgi:application --bind 0.0.0.0:80
  containerPort: "80"
  servicePort: "80"